<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sealed Letter — Private Notes</title>
  <style>
    /* High-contrast dark retro terminal theme */
    :root {
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --accent: #ff2a4b; /* Vibrant wax seal red */
      --accent-hover: #ff526e;
      --border: #333333;
      --focus-ring: #00e5ff; /* Cyan focus for high visibility */
      --card-bg: #141414;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Accessibility: Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .retro-cursor { display: none !important; }
      * { animation: none !important; transition: none !important; }
    }

    body {
      font-family: "Courier New", Courier, monospace;
      background-color: var(--bg);
      color: var(--text);
      font-size: 20px; /* Senior-friendly base size */
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      cursor: none; /* Hide default cursor */
    }

    .container {
      width: 100%;
      max-width: 700px;
      flex: 1;
      position: relative;
      z-index: 10;
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 3rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--text);
      border-bottom: 4px solid var(--accent);
      display: inline-block;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
    }

    blockquote {
      font-size: 1.2rem;
      font-weight: bold;
      color: #aaaaaa;
      min-height: 3rem; /* Prevent layout shift during typing */
    }

    .typewriter-cursor {
      display: inline-block;
      width: 10px;
      height: 1.2rem;
      background-color: var(--accent);
      vertical-align: bottom;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
    .typewriter-cursor.finished { display: none; }

    .card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      padding: 2rem;
      border-radius: 8px;
    }

    .nav-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .tab-btn {
      flex: 1;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 1rem;
      transition: all 0.2s;
      cursor: none;
    }

    .tab-btn[aria-selected="true"] {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .tab-btn:focus-visible, input:focus-visible, textarea:focus-visible, button:focus-visible {
      outline: 4px solid var(--focus-ring);
      outline-offset: 4px;
    }

    .view-section { display: none; }
    .view-section:not([hidden]) { display: block; animation: fadeIn 0.4s ease-in; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .form-group { margin-bottom: 2rem; }

    label {
      display: block;
      font-weight: bold;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 1rem;
      font-family: inherit;
      font-size: 1.2rem;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--focus-ring); /* Makes input text pop */
      border-radius: 4px;
      cursor: text !important; /* Force native text caret */
    }

    textarea { resize: vertical; min-height: 200px; }

    .action-btn {
      width: 100%;
      padding: 1.2rem;
      background: var(--accent);
      color: white;
      border: none;
      font-family: inherit;
      font-size: 1.4rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 4px;
      cursor: none;
    }

    .action-btn:hover { background: var(--accent-hover); }

    .status-message {
      margin-top: 1.5rem;
      padding: 1.5rem;
      border: 2px solid;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
    }

    .status-message[hidden] { display: none; }
    .status-success { border-color: #00ff00; color: #00ff00; background: rgba(0, 255, 0, 0.1); }
    .status-error { border-color: #ff0000; color: #ff0000; background: rgba(255, 0, 0, 0.1); }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
      padding-top: 2rem;
      border-top: 2px dashed var(--border);
      width: 100%;
      max-width: 700px;
    }

    /* Ultra-Visible X-Ray Cursor */
    .retro-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 30px; height: 30px;
      background-color: white; /* Combined with difference mode, this makes it perfectly inverted against anything */
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      border-radius: 4px;
      transition: width 0.1s, height 0.1s, border-radius 0.1s;
    }

    .retro-cursor.hovering {
      width: 45px; height: 45px;
      border-radius: 50%;
    }

    /* Fallback for touch devices */
    @media (hover: none) and (pointer: coarse) {
      body, .tab-btn, .action-btn { cursor: auto; }
      .retro-cursor { display: none !important; }
    }
  </style>
</head>
<body>

  <div id="retro-cursor" class="retro-cursor" aria-hidden="true"></div>

  <main class="container">
    <header>
      <h1>Sealed Letter</h1>
      <blockquote>
        <span id="typewriter-text"></span><span id="typewriter-cursor" class="typewriter-cursor"></span>
      </blockquote>
    </header>

    <nav aria-label="Application modes">
      <div class="nav-tabs" role="tablist">
        <button id="tab-write" class="tab-btn" role="tab" aria-selected="true" aria-controls="panel-write">Compose Note</button>
        <button id="tab-read" class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-read">Retrieve Note</button>
      </div>
    </nav>

    <section id="panel-write" class="view-section card" role="tabpanel" aria-labelledby="tab-write">
      <div class="form-group">
        <label for="note-content">Private Message</label>
        <textarea id="note-content" placeholder="Enter your text here..." aria-required="true"></textarea>
      </div>

      <div class="form-group">
        <label for="passkey-create">Master Passkey</label>
        <input type="text" id="passkey-create" placeholder="E.g., Alpha Bravo 99" aria-required="true" autocomplete="off">
      </div>

      <button id="btn-seal" class="action-btn">Seal Letter</button>

      <div id="write-status" class="status-message" role="alert" aria-live="assertive" hidden></div>
    </section>

    <section id="panel-read" class="view-section card" role="tabpanel" aria-labelledby="tab-read" hidden>
      <div class="form-group">
        <label for="passkey-enter">Enter Passkey</label>
        <input type="text" id="passkey-enter" placeholder="Exact passkey required..." aria-required="true" autocomplete="off">
      </div>

      <button id="btn-break" class="action-btn">Break Seal</button>

      <div id="read-status" class="status-message" role="alert" aria-live="assertive" hidden></div>
      
      <div class="form-group" style="margin-top: 2rem;">
        <label for="retrieved-content" class="sr-only">Retrieved Message</label>
        <textarea id="retrieved-content" readonly placeholder="Decrypted message appears here..." aria-label="Retrieved encrypted message"></textarea>
      </div>
    </section>
  </main>

  <footer>
    <p>Made By Dylan Grow &copy; 2026</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADPRoMDwuS_U1DcY_3N2UjVyKn8pBFv3s",
      authDomain: "sealed-letter-f3af5.firebaseapp.com",
      databaseURL: "https://sealed-letter-f3af5-default-rtdb.firebaseio.com",
      projectId: "sealed-letter-f3af5",
      storageBucket: "sealed-letter-f3af5.firebasestorage.app",
      messagingSenderId: "778056799822",
      appId: "1:778056799822:web:7a8b9c0d1e2f3a4b" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ---- Typewriter Effect ----
    const targetText = "A private ledger for your thoughts. Type your message, set your passkey, and leave no trace behind.";
    const textContainer = document.getElementById('typewriter-text');
    const cursorEl = document.getElementById('typewriter-cursor');
    let typeIndex = 0;

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (prefersReducedMotion) {
      textContainer.textContent = targetText;
      cursorEl.classList.add('finished');
    } else {
      function typeWriter() {
        if (typeIndex < targetText.length) {
          textContainer.textContent += targetText.charAt(typeIndex);
          typeIndex++;
          setTimeout(typeWriter, 35); // typing speed
        } else {
          setTimeout(() => cursorEl.classList.add('finished'), 2000); // Stop blinking after 2 seconds
        }
      }
      setTimeout(typeWriter, 500); // Start delay
    }

    // ---- X-Ray Cursor Logic ----
    const customCursor = document.getElementById('retro-cursor');
    const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    if (!prefersReducedMotion && !isTouchDevice) {
      document.addEventListener('mousemove', (e) => {
        customCursor.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
      });

      // Expand on interactive elements
      const interactives = document.querySelectorAll('button, .tab-btn');
      interactives.forEach(el => {
        el.addEventListener('mouseenter', () => customCursor.classList.add('hovering'));
        el.addEventListener('mouseleave', () => customCursor.classList.remove('hovering'));
      });

      // Hide custom cursor over text fields to allow native caret
      const textInputs = document.querySelectorAll('input, textarea');
      textInputs.forEach(input => {
        input.addEventListener('mouseenter', () => customCursor.style.opacity = '0');
        input.addEventListener('mouseleave', () => customCursor.style.opacity = '1');
      });
    }

    // ---- Tab Navigation ----
    const tabs = document.querySelectorAll('[role="tab"]');
    const panels = document.querySelectorAll('[role="tabpanel"]');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
        panels.forEach(p => p.setAttribute('hidden', 'true'));
        
        const targetPanel = document.getElementById(tab.getAttribute('aria-controls'));
        tab.setAttribute('aria-selected', 'true');
        targetPanel.removeAttribute('hidden');
      });

      tab.addEventListener('keydown', e => {
        let index = Array.prototype.indexOf.call(tabs, e.target);
        let dir = e.key === 'ArrowLeft' ? -1 : e.key === 'ArrowRight' ? 1 : null;
        if (dir !== null) {
          e.preventDefault();
          let nextIndex = (index + dir + tabs.length) % tabs.length;
          tabs[nextIndex].focus();
          tabs[nextIndex].click();
        }
      });
    });

    // ---- App Logic ----
    async function hashString(string) {
      const utf8 = new TextEncoder().encode(string);
      const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Write Note
    document.getElementById('btn-seal').addEventListener('click', async () => {
      const note = document.getElementById('note-content').value;
      const passkey = document.getElementById('passkey-create').value;
      const statusDiv = document.getElementById('write-status');
      
      if (!note || !passkey) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'SYSTEM ERR: Message and passkey required.';
        statusDiv.removeAttribute('hidden');
        return;
      }

      statusDiv.className = 'status-message';
      statusDiv.textContent = 'Encrypting & Sealing...';
      statusDiv.removeAttribute('hidden');

      try {
        const hash = await hashString(passkey);
        const encodedNote = btoa(encodeURIComponent(note)); 
        await set(ref(db, 'notes/' + hash), { payload: encodedNote });
        
        statusDiv.className = 'status-message status-success';
        statusDiv.textContent = 'SEALED. DO NOT LOSE YOUR PASSKEY.';
        
        document.getElementById('note-content').value = '';
        document.getElementById('passkey-create').value = '';
      } catch (e) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'SYSTEM ERR: Database connection failed.';
      }
    });

    // Read Note
    document.getElementById('btn-break').addEventListener('click', async () => {
      const passkey = document.getElementById('passkey-enter').value;
      const statusDiv = document.getElementById('read-status');
      const contentArea = document.getElementById('retrieved-content');

      if (!passkey) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'SYSTEM ERR: Passkey required.';
        statusDiv.removeAttribute('hidden');
        return;
      }

      statusDiv.className = 'status-message';
      statusDiv.textContent = 'Scanning database...';
      statusDiv.removeAttribute('hidden');

      try {
        const hash = await hashString(passkey);
        const snapshot = await get(ref(db, 'notes/' + hash));
        
        if (snapshot.exists()) {
          const decodedNote = decodeURIComponent(atob(snapshot.val().payload));
          contentArea.value = decodedNote;
          
          statusDiv.className = 'status-message status-success';
          statusDiv.textContent = 'SEAL BROKEN. MESSAGE DECRYPTED.';
          document.getElementById('passkey-enter').value = '';
        } else {
          statusDiv.className = 'status-message status-error';
          statusDiv.textContent = 'ACCESS DENIED: Incorrect passkey or no record found.';
          contentArea.value = '';
        }
      } catch (e) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'SYSTEM ERR: Database connection failed.';
      }
    });
  </script>
</body>
</html>
