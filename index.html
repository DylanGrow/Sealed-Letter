<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sealed Letter | Secure Transmissions</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Courier+Prime&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['Courier Prime', 'monospace'],
          },
          colors: {
            gold: {
              400: '#fbbf24',
              500: '#f59e0b',
              600: '#d97706',
            },
            zinc: {
              850: '#202024',
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <style>
    /* Custom Scrollbar and Base Styles */
    body {
      background-color: #09090b;
      color: #e4e4e7;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #09090b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }

    /* Ensure Three.js canvas stays in the background */
    #canvas-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* Smooth transitions for UI states */
    .fade-enter { opacity: 0; transform: translateY(10px); }
    .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms, transform 400ms; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 antialiased relative">

  <div id="canvas-container" aria-hidden="true"></div>

  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-full max-w-xs"></div>

  <main class="w-full max-w-xl z-10">
    
    <header class="text-center mb-8">
      <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">
        SEALED <span class="text-gold-500">LETTER</span>
      </h1>
      <p class="text-zinc-400 text-sm font-mono">End-to-end encrypted protocol. Burn on read.</p>
    </header>

    <section id="compose-view" class="bg-zinc-850/80 backdrop-blur-md rounded-2xl p-6 border border-zinc-800 shadow-2xl transition-all duration-300">
      
      <div class="mb-6">
        <label for="note-text" class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">The Payload</label>
        <textarea id="note-text" rows="6" 
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-4 text-zinc-200 font-mono focus:outline-none focus:ring-2 focus:ring-gold-500 focus:border-transparent transition-all resize-none placeholder-zinc-600" 
          placeholder="Enter the transmission data here..."></textarea>
      </div>

      <div class="mb-6">
        <label for="phrase-input" class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Decryption Key (Passphrase)</label>
        <input type="text" id="phrase-input" autocomplete="off"
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-4 text-zinc-200 font-mono focus:outline-none focus:ring-2 focus:ring-gold-500 focus:border-transparent transition-all placeholder-zinc-600" 
          placeholder="e.g., hunter2">
        <p class="text-xs text-zinc-500 mt-2 font-mono">Do not lose this. Recovery is mathematically impossible.</p>
      </div>

      <button id="save-btn" 
        class="w-full bg-gold-500 hover:bg-gold-400 text-zinc-950 font-bold py-4 px-6 rounded-xl transition-all active:scale-95 flex justify-center items-center gap-2">
        <span>Encrypt & Seal Letter</span>
      </button>

      <div id="share-section" class="mt-6 hidden bg-zinc-950 rounded-xl border border-dashed border-gold-500/50 p-4 text-center">
        <p class="text-xs font-bold text-gold-500 uppercase tracking-wider mb-2">Transmission Link Generated</p>
        <div id="share-url" class="font-mono text-sm text-zinc-300 break-all mb-4 select-all"></div>
        <button id="copy-btn" class="bg-zinc-800 hover:bg-zinc-700 text-white text-sm py-2 px-4 rounded-lg transition-colors border border-zinc-600">
          Copy Link
        </button>
      </div>
    </section>

    <section id="unlock-view" class="hidden bg-zinc-850/80 backdrop-blur-md rounded-2xl p-6 border border-zinc-800 shadow-2xl transition-all duration-300">
      
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-zinc-950 border border-gold-500 mb-4">
          <svg class="w-8 h-8 text-gold-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-xl font-bold text-white">Encrypted Transmission Found</h2>
        <p class="text-sm text-zinc-400 font-mono mt-1">Provide the decryption key to access payload.</p>
      </div>

      <div class="mb-6">
        <input type="text" id="unlock-input" autocomplete="off"
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-4 text-zinc-200 font-mono text-center focus:outline-none focus:ring-2 focus:ring-gold-500 focus:border-transparent transition-all placeholder-zinc-600" 
          placeholder="Enter Passphrase">
      </div>

      <button id="unlock-btn" 
        class="w-full bg-gold-500 hover:bg-gold-400 text-zinc-950 font-bold py-4 px-6 rounded-xl transition-all active:scale-95">
        Break Seal & Read
      </button>

      <div id="note-reveal" class="mt-6 hidden border-t border-zinc-700 pt-6">
        <p class="text-xs font-bold text-green-500 uppercase tracking-wider mb-2 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Decryption Successful
        </p>
        <div id="note-content" class="bg-zinc-950 rounded-xl p-4 font-mono text-zinc-200 whitespace-pre-wrap border border-zinc-800"></div>
        
        <div class="mt-6 flex justify-center">
           <button onclick="window.location.href = window.location.pathname" class="text-sm text-zinc-400 hover:text-white transition-colors underline">Compose a new letter</button>
        </div>
      </div>
    </section>

  </main>

  <script type="module">
    // ----------------------------------------------------------------------
    // 1. Firebase Initialization & Imports
    // ----------------------------------------------------------------------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADPRoMDwuS_U1DcY_3N2UjVyKn8pBFv3s",
      authDomain: "sealed-letter-f3af5.firebaseapp.com",
      databaseURL: "https://sealed-letter-f3af5-default-rtdb.firebaseio.com",
      projectId: "sealed-letter-f3af5",
      storageBucket: "sealed-letter-f3af5.firebasestorage.app",
      messagingSenderId: "778056799822",
      appId: "1:778056799822:web:9f1b9ffb42d74604cc151f"
    };

    let db;
    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
    } catch (err) {
      console.error("Firebase Init Error:", err);
    }

    // ----------------------------------------------------------------------
    // 2. Custom Toast Notification System (Replaces alert)
    // ----------------------------------------------------------------------
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      // Determine styling based on type
      let bgColor = 'bg-zinc-800';
      let border = 'border-zinc-600';
      let icon = 'ℹ️';

      if (type === 'error') { bgColor = 'bg-red-950'; border = 'border-red-800'; icon = '⚠️'; }
      if (type === 'success') { bgColor = 'bg-green-950'; border = 'border-green-800'; icon = '✓'; }

      toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg border ${border} flex items-center gap-3 font-mono text-sm transform transition-all duration-300 translate-x-full opacity-0`;
      toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
      
      container.appendChild(toast);

      // Animate In
      requestAnimationFrame(() => {
        toast.classList.remove('translate-x-full', 'opacity-0');
      });

      // Animate Out & Remove
      setTimeout(() => {
        toast.classList.add('translate-x-full', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // ----------------------------------------------------------------------
    // 3. Audio Engine (Tone.js)
    // ----------------------------------------------------------------------
    let audioInitialized = false;
    
    // Synthesizer for UI blips
    const uiSynth = new Tone.PolySynth(Tone.FMSynth).toDestination();
    uiSynth.set({
      envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 1 },
      harmonicity: 3,
      modulationIndex: 10
    });

    // Synthesizer for the heavy "crack" / burn sound
    const noiseSynth = new Tone.NoiseSynth({
      noise: { type: "brown" },
      envelope: { attack: 0.05, decay: 0.8, sustain: 0.1, release: 2 }
    }).toDestination();
    const filter = new Tone.Filter(800, "lowpass").toDestination();
    noiseSynth.connect(filter);

    async function initAudio() {
      if (!audioInitialized) {
        await Tone.start();
        audioInitialized = true;
      }
    }

    function playActionSound() {
      if(audioInitialized) uiSynth.triggerAttackRelease(["C4", "E4", "G4"], "16n");
    }

    function playUnlockSound() {
      if(audioInitialized) {
        noiseSynth.triggerAttackRelease("4n");
        uiSynth.triggerAttackRelease(["C2", "G2"], "8n"); // Deep thud
      }
    }

    function playErrorSound() {
      if(audioInitialized) uiSynth.triggerAttackRelease(["C3", "Db3"], "8n");
    }

    // Initialize audio on first user interaction anywhere on the document
    document.body.addEventListener('pointerdown', initAudio, { once: true });
    document.body.addEventListener('keydown', initAudio, { once: true });

    // ----------------------------------------------------------------------
    // 4. Background Rendering (Three.js Embers)
    // ----------------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x09090b, 0.002);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 100;

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Create particles
    const particleCount = 200;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const velocities = [];

    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 400; // x
      positions[i * 3 + 1] = (Math.random() - 0.5) * 400; // y
      positions[i * 3 + 2] = (Math.random() - 0.5) * 200; // z
      velocities.push({
        x: (Math.random() - 0.5) * 0.2,
        y: Math.random() * 0.5 + 0.1 // Moving upwards
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    // Simple material for embers
    const material = new THREE.PointsMaterial({
      color: 0xf59e0b, // Tailwind Gold-500
      size: 1.5,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);
      const positions = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += velocities[i].y; // Move up
        positions[i * 3] += velocities[i].x;     // Drift sideways
        
        // Reset if it goes too high
        if (positions[i * 3 + 1] > 200) {
          positions[i * 3 + 1] = -200;
          positions[i * 3] = (Math.random() - 0.5) * 400;
        }
      }
      particles.geometry.attributes.position.needsUpdate = true;
      // Slowly rotate the entire system
      particles.rotation.y += 0.001;
      renderer.render(scene, camera);
    }
    animate();

    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----------------------------------------------------------------------
    // 5. Cryptography (Web Crypto API)
    // ----------------------------------------------------------------------
    const enc = new TextEncoder(), dec = new TextDecoder();

    // Derives a secure key from the user's password using PBKDF2
    async function deriveKey(phrase, salt) {
      const raw = await crypto.subtle.importKey("raw", enc.encode(phrase), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
        raw, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
      );
    }

    // Encrypts text using AES-GCM
    async function encrypt(text, phrase) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(phrase, salt);
      const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
      
      const buf = new Uint8Array(salt.byteLength + iv.byteLength + ct.byteLength);
      buf.set(salt, 0); buf.set(iv, 16); buf.set(new Uint8Array(ct), 28);
      return btoa(String.fromCharCode(...buf)); // Return Base64 encoded cipher
    }

    // Decrypts AES-GCM ciphertext
    async function decrypt(b64, phrase) {
      const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const salt = buf.slice(0, 16), iv = buf.slice(16, 28), ct = buf.slice(28);
      const key = await deriveKey(phrase, salt);
      const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
      return dec.decode(pt);
    }

    const normalizePassphrase = p => p.toLowerCase().replace(/\s+/g, ' ').trim();

    // ----------------------------------------------------------------------
    // 6. Application Controller Logic
    // ----------------------------------------------------------------------
    
    // View Management based on URL Hash
    function updateView() {
      const composeView = document.getElementById('compose-view');
      const unlockView = document.getElementById('unlock-view');
      
      if (location.hash.length > 1) {
        // We have a hash, show unlock mode
        composeView.classList.add('hidden');
        unlockView.classList.remove('hidden');
      } else {
        // No hash, show compose mode
        composeView.classList.remove('hidden');
        unlockView.classList.add('hidden');
      }
    }

    // Call on load and on hash change
    window.addEventListener('hashchange', updateView);
    updateView();

    // -- Handle Saving / Encrypting --
    document.getElementById('save-btn').addEventListener('click', async () => {
      const noteInput = document.getElementById('note-text');
      const phraseInput = document.getElementById('phrase-input');
      const btn = document.getElementById('save-btn');
      
      const note = noteInput.value.trim();
      const phrase = phraseInput.value.trim();

      if (!note) { showToast('Payload cannot be empty.', 'error'); playErrorSound(); return; }
      if (!phrase) { showToast('Decryption key is required.', 'error'); playErrorSound(); return; }

      try {
        btn.disabled = true;
        btn.innerHTML = `<span class="animate-pulse">Encrypting...</span>`;
        
        // Generate a random ID
        const id = Math.random().toString(36).slice(2, 12);
        
        // Encrypt locally
        const encrypted = await encrypt(note, normalizePassphrase(phrase));
        
        // Save to Firebase
        await set(ref(db, `notes/${id}`), { c: encrypted, t: Date.now() });
        
        // Update UI
        playActionSound();
        const url = `${location.origin}${location.pathname}#${id}`;
        document.getElementById('share-url').textContent = url;
        document.getElementById('share-section').classList.remove('hidden');
        
        showToast('Payload sealed and ready for transmission.', 'success');
        
        // Lock inputs
        noteInput.disabled = true;
        phraseInput.disabled = true;
        btn.innerHTML = `<span>Sealed</span>`;

      } catch (err) {
        console.error(err);
        showToast('Encryption or network failure.', 'error');
        playErrorSound();
        btn.disabled = false;
        btn.innerHTML = `<span>Encrypt & Seal Letter</span>`;
      }
    });

    // -- Handle Copy Link --
    document.getElementById('copy-btn').addEventListener('click', async () => {
      const url = document.getElementById('share-url').textContent;
      try {
        await navigator.clipboard.writeText(url);
        showToast('Link copied to clipboard.', 'info');
        playActionSound();
      } catch (err) {
        showToast('Failed to copy. Please copy manually.', 'error');
      }
    });

    // -- Handle Decrypting / Unlocking --
    document.getElementById('unlock-btn').addEventListener('click', async () => {
      const phrase = document.getElementById('unlock-input').value.trim();
      const id = location.hash.slice(1);
      const btn = document.getElementById('unlock-btn');

      if (!phrase) { showToast('Passphrase required.', 'error'); playErrorSound(); return; }

      try {
        btn.disabled = true;
        btn.innerHTML = `<span class="animate-pulse">Decrypting...</span>`;

        // Fetch from Firebase
        const snap = await get(ref(db, `notes/${id}`));
        
        if (!snap.exists()) {
          showToast('Data missing or already destroyed.', 'error');
          playErrorSound();
          btn.disabled = false;
          btn.innerHTML = `<span>Break Seal & Read</span>`;
          return;
        }

        // Attempt Decryption
        const text = await decrypt(snap.val().c, normalizePassphrase(phrase));
        
        // Success: Burn after reading (Delete from Firebase)
        await remove(ref(db, `notes/${id}`));
        
        playUnlockSound(); // Big sound effect
        showToast('Seal broken. Data destroyed from servers.', 'success');
        
        // Accelerate Three.js particles to simulate an explosion/burn
        for (let i = 0; i < particleCount; i++) {
          velocities[i].y += (Math.random() * 2);
          velocities[i].x *= 3;
        }
        material.color.setHex(0xef4444); // Flash red

        // Reveal content
        document.getElementById('unlock-input').disabled = true;
        btn.classList.add('hidden');
        
        document.getElementById('note-reveal').classList.remove('hidden');
        document.getElementById('note-content').textContent = text;

      } catch (err) {
        // Decryption failed (Wrong password)
        showToast('Decryption failed. Invalid Key.', 'error');
        playErrorSound();
        btn.disabled = false;
        btn.innerHTML = `<span>Break Seal & Read</span>`;
      }
    });

    // Allow 'Enter' key to trigger primary buttons
    document.getElementById('phrase-input').addEventListener('keydown', (e) => {
      if(e.key === 'Enter') document.getElementById('save-btn').click();
    });
    document.getElementById('unlock-input').addEventListener('keydown', (e) => {
      if(e.key === 'Enter') document.getElementById('unlock-btn').click();
    });

  </script>
</body>
</html>
