<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sealed Letter — Private Notes</title>
  <style>
    /* Warm, light retro theme with pop-art brutalist elements */
    :root {
      --bg: #FDF9F1; 
      --text: #1A1A1A; 
      --accent: #E63946; 
      --accent-hover: #D62828;
      --border: #1A1A1A;
      --focus-ring: #457B9D; 
      --card-bg: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Accessibility: Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .custom-cursor-element {
        display: none !important;
      }
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    body {
      font-family: "Georgia", "Times New Roman", serif;
      background-color: var(--bg);
      color: var(--text);
      font-size: 18px; 
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      overflow-x: hidden;
      /* We hide the default cursor on the body, but restore it for text */
      cursor: none; 
    }

    .container {
      width: 100%;
      max-width: 650px;
      flex: 1;
      position: relative;
      z-index: 10; 
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-family: "Arial Black", "Impact", sans-serif;
      font-size: 3rem;
      text-transform: uppercase;
      letter-spacing: -1px;
      color: var(--text);
      text-shadow: 4px 4px 0px var(--accent);
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1.2rem;
      font-weight: bold;
      background: var(--text);
      color: var(--bg);
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
    }

    /* Retro Card Styling */
    .card {
      background: var(--card-bg);
      border: 4px solid var(--border);
      box-shadow: 8px 8px 0px var(--border);
      padding: 2rem;
      margin-bottom: 2rem;
      border-radius: 8px;
    }

    .nav-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .tab-btn {
      flex: 1;
      background: var(--card-bg);
      border: 3px solid var(--border);
      color: var(--text);
      font-family: "Verdana", "Tahoma", sans-serif;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 1rem;
      box-shadow: 4px 4px 0px var(--border);
      transition: transform 0.1s, box-shadow 0.1s;
      border-radius: 6px;
      cursor: none; /* Hide default pointer, use custom */
    }

    .tab-btn[aria-selected="true"] {
      background: var(--accent);
      color: white;
    }

    .tab-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--border);
    }

    .tab-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--border);
    }

    .tab-btn:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    button:focus-visible {
      outline: 4px solid var(--focus-ring);
      outline-offset: 4px;
    }

    .view-section { display: none; }
    .view-section:not([hidden]) { display: block; animation: slideUp 0.3s ease-out; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-family: "Verdana", sans-serif;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    /* Restore native text cursor for inputs! */
    input[type="text"],
    textarea {
      width: 100%;
      padding: 1rem;
      font-family: "Courier New", Courier, monospace;
      font-size: 1.2rem;
      font-weight: bold;
      background: var(--bg);
      border: 3px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      cursor: text !important; 
    }

    textarea { resize: vertical; min-height: 180px; }

    .action-btn {
      width: 100%;
      padding: 1.2rem;
      background: var(--accent);
      color: white;
      border: 3px solid var(--border);
      font-family: "Verdana", sans-serif;
      font-size: 1.3rem;
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 5px 5px 0px var(--border);
      transition: transform 0.1s, box-shadow 0.1s;
      border-radius: 6px;
      cursor: none; 
    }

    .action-btn:hover {
      background: var(--accent-hover);
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0px var(--border);
    }

    .action-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0px var(--border);
    }

    .status-message {
      margin-top: 1.5rem;
      padding: 1.5rem;
      border: 3px solid var(--border);
      font-family: "Verdana", sans-serif;
      font-weight: bold;
      font-size: 1.1rem;
      text-align: center;
      border-radius: 6px;
    }

    .status-message[hidden] { display: none; }
    .status-success { background: #D8F3DC; border-color: #1B4332; color: #081C15; box-shadow: 4px 4px 0px #1B4332; }
    .status-error { background: #FFD6D6; border-color: #780000; color: #780000; box-shadow: 4px 4px 0px #780000; }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-family: "Verdana", sans-serif;
      font-weight: bold;
      font-size: 1rem;
      padding-top: 1.5rem;
      border-top: 4px solid var(--border);
      width: 100%;
      max-width: 650px;
    }

    /* --- Improved Custom Cursor --- */
    .custom-cursor-element {
      position: fixed;
      top: 0; 
      left: 0;
      pointer-events: none; /* Let clicks pass through */
      z-index: 9999;
      will-change: transform;
    }

    #cursor-dot {
      width: 10px;
      height: 10px;
      background-color: var(--accent);
      border-radius: 50%;
    }

    #cursor-halo {
      width: 40px;
      height: 40px;
      border: 2px solid var(--text);
      border-radius: 50%;
      transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    /* When hovering over buttons/tabs */
    #cursor-halo.hovering {
      width: 60px;
      height: 60px;
      background-color: rgba(230, 57, 70, 0.15); /* Light red tint */
      border-color: var(--accent);
    }

    /* Hidden entirely on touch devices */
    @media (hover: none) and (pointer: coarse) {
      body { cursor: auto; }
      .tab-btn, .action-btn { cursor: pointer; }
      .custom-cursor-element { display: none !important; }
    }
  </style>
</head>
<body>

  <div id="cursor-dot" class="custom-cursor-element" aria-hidden="true"></div>
  <div id="cursor-halo" class="custom-cursor-element" aria-hidden="true"></div>

  <main class="container">
    <header>
      <h1>Sealed Letter</h1>
      <div class="subtitle">Write once. Seal it. Read anywhere.</div>
    </header>

    <nav aria-label="Application modes">
      <div class="nav-tabs" role="tablist">
        <button id="tab-write" class="tab-btn" role="tab" aria-selected="true" aria-controls="panel-write">Write Note</button>
        <button id="tab-read" class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-read">Read Note</button>
      </div>
    </nav>

    <section id="panel-write" class="view-section card" role="tabpanel" aria-labelledby="tab-write">
      <div class="form-group">
        <label for="note-content">1. Type Your Message</label>
        <textarea id="note-content" placeholder="Type your secrets here... Everything is encrypted." aria-required="true"></textarea>
      </div>

      <div class="form-group">
        <label for="passkey-create">2. Create a Passkey</label>
        <input type="text" id="passkey-create" placeholder="Example: Blue Bird 42" aria-required="true" autocomplete="off">
      </div>

      <button id="btn-seal" class="action-btn">Seal Letter</button>

      <div id="write-status" class="status-message" role="alert" aria-live="assertive" hidden></div>
    </section>

    <section id="panel-read" class="view-section card" role="tabpanel" aria-labelledby="tab-read" hidden>
      <div class="form-group">
        <label for="passkey-enter">Enter Your Passkey</label>
        <input type="text" id="passkey-enter" placeholder="Type it exactly as you saved it..." aria-required="true" autocomplete="off">
      </div>

      <button id="btn-break" class="action-btn">Open Letter</button>

      <div id="read-status" class="status-message" role="alert" aria-live="assertive" hidden></div>
      
      <div class="form-group" style="margin-top: 2rem;">
        <label for="retrieved-content" class="sr-only">Retrieved Message</label>
        <textarea id="retrieved-content" readonly placeholder="Your message will appear here..." aria-label="Retrieved encrypted message"></textarea>
      </div>
    </section>
  </main>

  <footer>
    <p>Made By Dylan Grow &copy; 2026</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADPRoMDwuS_U1DcY_3N2UjVyKn8pBFv3s",
      authDomain: "sealed-letter-f3af5.firebaseapp.com",
      databaseURL: "https://sealed-letter-f3af5-default-rtdb.firebaseio.com",
      projectId: "sealed-letter-f3af5",
      storageBucket: "sealed-letter-f3af5.firebasestorage.app",
      messagingSenderId: "778056799822",
      appId: "1:778056799822:web:7a8b9c0d1e2f3a4b" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ---- Smooth Physics Cursor Logic ----
    const dot = document.getElementById('cursor-dot');
    const halo = document.getElementById('cursor-halo');
    
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let haloX = mouseX;
    let haloY = mouseY;

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    if (!prefersReducedMotion && !isTouchDevice) {
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        // Dot follows mouse instantly
        dot.style.transform = `translate3d(calc(${mouseX}px - 50%), calc(${mouseY}px - 50%), 0)`;
      });

      // Halo follows with smooth linear interpolation (lerp)
      function renderHalo() {
        haloX += (mouseX - haloX) * 0.15; // The smaller the decimal, the more it trails
        haloY += (mouseY - haloY) * 0.15;
        halo.style.transform = `translate3d(calc(${haloX}px - 50%), calc(${haloY}px - 50%), 0)`;
        requestAnimationFrame(renderHalo);
      }
      requestAnimationFrame(renderHalo);

      // Interactive Hover States
      const buttons = document.querySelectorAll('button');
      const textInputs = document.querySelectorAll('input, textarea');

      // Expand halo on buttons
      buttons.forEach(btn => {
        btn.addEventListener('mouseenter', () => {
          halo.classList.add('hovering');
          dot.style.opacity = '0'; // Hide dot while hovering over button
        });
        btn.addEventListener('mouseleave', () => {
          halo.classList.remove('hovering');
          dot.style.opacity = '1';
        });
      });

      // Hide custom cursor elements entirely when over text inputs so the native caret works!
      textInputs.forEach(input => {
        input.addEventListener('mouseenter', () => {
          dot.style.display = 'none';
          halo.style.display = 'none';
        });
        input.addEventListener('mouseleave', () => {
          dot.style.display = 'block';
          halo.style.display = 'block';
        });
      });
    }

    // ---- Tab Navigation ----
    const tabs = document.querySelectorAll('[role="tab"]');
    const panels = document.querySelectorAll('[role="tabpanel"]');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
        panels.forEach(p => p.setAttribute('hidden', 'true'));
        
        const targetPanel = document.getElementById(tab.getAttribute('aria-controls'));
        tab.setAttribute('aria-selected', 'true');
        targetPanel.removeAttribute('hidden');
      });

      tab.addEventListener('keydown', e => {
        let index = Array.prototype.indexOf.call(tabs, e.target);
        let dir = e.key === 'ArrowLeft' ? -1 : e.key === 'ArrowRight' ? 1 : null;

        if (dir !== null) {
          e.preventDefault();
          let nextIndex = (index + dir + tabs.length) % tabs.length;
          tabs[nextIndex].focus();
          tabs[nextIndex].click();
        }
      });
    });

    // ---- App Logic ----
    async function hashString(string) {
      const utf8 = new TextEncoder().encode(string);
      const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Write Note
    document.getElementById('btn-seal').addEventListener('click', async () => {
      const note = document.getElementById('note-content').value;
      const passkey = document.getElementById('passkey-create').value;
      const statusDiv = document.getElementById('write-status');
      
      if (!note || !passkey) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'Please fill out both the message and passkey.';
        statusDiv.removeAttribute('hidden');
        return;
      }

      statusDiv.className = 'status-message';
      statusDiv.textContent = 'Sealing letter...';
      statusDiv.removeAttribute('hidden');

      try {
        const hash = await hashString(passkey);
        const encodedNote = btoa(encodeURIComponent(note)); 
        await set(ref(db, 'notes/' + hash), { payload: encodedNote });
        
        statusDiv.className = 'status-message status-success';
        statusDiv.innerHTML = '<strong>Success!</strong> Letter sealed. Write down your passkey.';
        
        document.getElementById('note-content').value = '';
        document.getElementById('passkey-create').value = '';
      } catch (e) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'Connection Error. Could not seal letter.';
      }
    });

    // Read Note
    document.getElementById('btn-break').addEventListener('click', async () => {
      const passkey = document.getElementById('passkey-enter').value;
      const statusDiv = document.getElementById('read-status');
      const contentArea = document.getElementById('retrieved-content');

      if (!passkey) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'Please enter your passkey.';
        statusDiv.removeAttribute('hidden');
        return;
      }

      statusDiv.className = 'status-message';
      statusDiv.textContent = 'Searching...';
      statusDiv.removeAttribute('hidden');

      try {
        const hash = await hashString(passkey);
        const snapshot = await get(ref(db, 'notes/' + hash));
        
        if (snapshot.exists()) {
          const decodedNote = decodeURIComponent(atob(snapshot.val().payload));
          contentArea.value = decodedNote;
          
          statusDiv.className = 'status-message status-success';
          statusDiv.innerHTML = '<strong>Seal Broken.</strong> Message below.';
          document.getElementById('passkey-enter').value = '';
        } else {
          statusDiv.className = 'status-message status-error';
          statusDiv.textContent = 'Incorrect passkey or no message found.';
          contentArea.value = '';
        }
      } catch (e) {
        statusDiv.className = 'status-message status-error';
        statusDiv.textContent = 'Connection Error. Could not search database.';
      }
    });
  </script>
</body>
</html>
